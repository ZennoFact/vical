name: Build & Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Archive Release
        shell: pwsh
        run: |
          # 確実にパスを通すため、特定のexeを指定するかワイルドカードを使用します
          # ここで作成するzip名を vical.zip とします
          Compress-Archive -Path target/release/*.exe -DestinationPath vical.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          # 上のステップで作ったファイル名と一致させる
          files: vical.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
